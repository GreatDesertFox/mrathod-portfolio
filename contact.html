<!DOCTYPE html>
<html lang="en" data-theme="cyber">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayur Rathod | Contact</title>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="theme.css">
  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 14, 26, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
    }

    nav ul { display: flex; gap: 30px; list-style: none; padding: 0; margin: 0; }

    nav a {
      position: relative;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 4px;
      font-family: var(--font-mono);
      transition: color 0.3s ease;
    }

    nav a::after {
      content: "";
      position: absolute;
      left: 0; bottom: -6px;
      width: 0%; height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      transition: width 0.3s ease;
    }

    nav a:hover::after, nav a.active::after { width: 100%; }
    nav a:hover, nav a.active { color: var(--accent); }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 50px 20px 80px;
      position: relative;
      z-index: 1;
    }

    /* PAGE HEADER */
    .page-header {
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .page-tag {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .page-tag::before { content: '> '; opacity: 0.5; }

    .page-header h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
    }

    .page-header h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-header p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    /* CONTACT CARDS */
    .contact-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contact-item {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      text-decoration: none;
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      position: relative;
      overflow: hidden;
    }

    .contact-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .contact-item:hover {
      transform: translateX(6px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .contact-item:hover::before { opacity: 1; }

    /* Individual accent colors */
    .contact-item.phone  { border-left: 3px solid rgba(16,185,129,0.5); }
    .contact-item.email  { border-left: 3px solid rgba(0,212,255,0.5); }
    .contact-item.linkedin { border-left: 3px solid rgba(124,58,237,0.5); }

    .contact-item.phone::before  { background: linear-gradient(to right, #10b981, transparent); }
    .contact-item.email::before  { background: linear-gradient(to right, var(--accent), transparent); }
    .contact-item.linkedin::before { background: linear-gradient(to right, var(--accent2), transparent); }

    .contact-item.phone:hover  { border-color: rgba(16,185,129,0.5); }
    .contact-item.email:hover  { border-color: rgba(0,212,255,0.5); }
    .contact-item.linkedin:hover { border-color: rgba(124,58,237,0.5); }

    .contact-item:nth-child(1) { animation-delay: 0.3s; }
    .contact-item:nth-child(2) { animation-delay: 0.45s; }
    .contact-item:nth-child(3) { animation-delay: 0.6s; }

    /* ICON */
    .contact-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .phone  .contact-icon { background: rgba(16,185,129,0.1);  border: 1px solid rgba(16,185,129,0.2); }
    .email  .contact-icon { background: rgba(0,212,255,0.1);   border: 1px solid rgba(0,212,255,0.2); }
    .linkedin .contact-icon { background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.2); }

    .contact-info { flex: 1; }

    .contact-label {
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 4px;
    }

    .phone   .contact-label { color: #10b981; }
    .email   .contact-label { color: var(--accent); }
    .linkedin .contact-label { color: #a78bfa; }

    .contact-item.phone .contact-value {
      color: #10b981;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    /* Override mobile browser auto-detected phone link color */
    .contact-item.phone .contact-value a,
    .contact-item.phone .contact-value a:link,
    .contact-item.phone .contact-value a:visited {
      color: #10b981 !important;
      text-decoration: none;
    }

    .contact-value {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .contact-arrow {
      font-family: var(--font-mono);
      font-size: 18px;
      color: var(--muted);
      transition: color 0.3s, transform 0.3s;
    }

    .contact-item:hover .contact-arrow {
      transform: translateX(4px);
    }

    .phone:hover   .contact-arrow { color: #10b981; }
    .email:hover   .contact-arrow { color: var(--accent); }
    .linkedin:hover .contact-arrow { color: #a78bfa; }


    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

</html>
