<!DOCTYPE html>
<html lang="en" data-theme="cyber">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayur Rathod | Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <style>
    .container { max-width: 700px; }

    .page-header { margin-bottom: 40px; opacity: 0; animation: fadeUp 0.6s ease forwards 0.2s; }
    .page-header h1 { font-family: 'Rajdhani', sans-serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 700; }
    .page-header h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .page-header p { margin-top: 12px; color: var(--muted); font-size: 15px; line-height: 1.7; }

    .contact-grid { display: flex; flex-direction: column; gap: 16px; }

    .contact-item {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 22px 24px;
      display: flex; align-items: center; gap: 20px;
      text-decoration: none;
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
      opacity: 0; animation: fadeUp 0.5s ease forwards;
      position: relative; overflow: hidden;
    }

    .contact-item::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; opacity: 0; transition: opacity 0.3s; }
    .contact-item:hover { transform: translateX(6px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
    .contact-item:hover::before { opacity: 1; }

    .contact-item.phone   { border-left: 3px solid color-mix(in srgb, var(--accent3) 50%, transparent); }
    .contact-item.email   { border-left: 3px solid color-mix(in srgb, var(--accent)  50%, transparent); }
    .contact-item.linkedin { border-left: 3px solid color-mix(in srgb, var(--accent2) 50%, transparent); }

    .contact-item.phone::before   { background: linear-gradient(to right, var(--accent3), transparent); }
    .contact-item.email::before   { background: linear-gradient(to right, var(--accent),  transparent); }
    .contact-item.linkedin::before { background: linear-gradient(to right, var(--accent2), transparent); }

    .contact-item.phone:hover   { border-color: color-mix(in srgb, var(--accent3) 50%, transparent); }
    .contact-item.email:hover   { border-color: color-mix(in srgb, var(--accent)  50%, transparent); }
    .contact-item.linkedin:hover { border-color: color-mix(in srgb, var(--accent2) 50%, transparent); }

    .contact-item:nth-child(1) { animation-delay: 0.3s; }
    .contact-item:nth-child(2) { animation-delay: 0.45s; }
    .contact-item:nth-child(3) { animation-delay: 0.6s; }

    .contact-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .phone .contact-icon    { background: color-mix(in srgb, var(--accent3) 10%, transparent); border: 1px solid color-mix(in srgb, var(--accent3) 20%, transparent); }
    .email .contact-icon    { background: color-mix(in srgb, var(--accent)  10%, transparent); border: 1px solid color-mix(in srgb, var(--accent)  20%, transparent); }
    .linkedin .contact-icon { background: color-mix(in srgb, var(--accent2) 10%, transparent); border: 1px solid color-mix(in srgb, var(--accent2) 20%, transparent); }

    .contact-info { flex: 1; }

    .contact-label { font-family: 'Share Tech Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 4px; }
    .phone .contact-label    { color: var(--accent3); }
    .email .contact-label    { color: var(--accent); }
    .linkedin .contact-label { color: var(--accent2); }

    .contact-value { font-size: 15px; font-weight: 500; color: var(--text); }

    .contact-arrow { font-family: 'Share Tech Mono', monospace; font-size: 18px; color: var(--muted); transition: color 0.3s, transform 0.3s; }
    .contact-item:hover .contact-arrow { transform: translateX(4px); }
    .phone:hover .contact-arrow    { color: var(--accent3); }
    .email:hover .contact-arrow    { color: var(--accent); }
    .linkedin:hover .contact-arrow { color: var(--accent2); }

    .status-card {
      margin-top: 32px; background: var(--card);
      border: 1px solid var(--card-border); border-radius: 12px;
      padding: 22px 24px; display: flex; align-items: center; gap: 14px;
      opacity: 0; animation: fadeUp 0.5s ease forwards 0.75s;
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent3); box-shadow: 0 0 10px var(--accent3); flex-shrink: 0; animation: pulse 2s infinite; }
    .status-text { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--accent3); }
    .status-text span { color: var(--muted); }
  </style>
</head>
<body>
